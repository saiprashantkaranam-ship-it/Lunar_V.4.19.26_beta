<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether AI | Master Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg-darker: #020617; --glass: rgba(30, 41, 59, 0.7); --glass-border: rgba(255, 255, 255, 0.1); --text-main: #f8fafc; --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-darker); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%); }
        .app-container { width: 95%; max-width: 900px; height: 85vh; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; display: flex; flex-direction: column; }
        .header { padding: 20px 32px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Outfit'; font-weight: 700; font-size: 1.5rem; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chat-area { flex: 1; padding: 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 14px 20px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; }
        .message.bot { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); }
        .message.user { align-self: flex-end; background: var(--accent-gradient); color: white; }
        .input-container { padding: 20px; border-top: 1px solid var(--glass-border); display: flex; gap: 10px; }
        input { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 12px 18px; border-radius: 12px; color: white; outline: none; }
        button { background: var(--primary); border: none; padding: 0 20px; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-box { background: #0f172a; padding: 30px; border-radius: 20px; border: 1px solid var(--glass-border); width: 350px; text-align: center; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">AETHER AI</div>
            <button onclick="document.getElementById('modal').style.display='flex'">Setup API</button>
        </header>
        <div class="chat-area" id="chat">
            <div class="message bot">System Ready, Master. Enter your token to begin.</div>
        </div>
        <div class="input-container">
            <input type="text" id="in" placeholder="Command..." onkeypress="if(event.key=='Enter') send()">
            <button onclick="send()">Send</button>
        </div>
    </div>
    <div id="modal">
        <div class="modal-box">
            <h3>Enter HF Token</h3>
            <input type="password" id="tok" placeholder="hf_..." style="width:100%; margin: 15px 0; padding:10px; background:rgba(255,255,255,0.1); border:none; color:white;">
            <button onclick="save()" style="width:100%; padding:10px;">Connect</button>
        </div>
    </div>
    <script>
        let t = localStorage.getItem('hf') || '';
        if(!t) document.getElementById('modal').style.display='flex';
        function save(){ t=document.getElementById('tok').value; localStorage.setItem('hf', t); document.getElementById('modal').style.display='none'; }
        function add(msg, s){ let d=document.createElement('div'); d.className='message '+s; d.innerText=msg; document.getElementById('chat').appendChild(d); document.getElementById('chat').scrollTop=99999; }
        async function send(){
            let txt = document.getElementById('in').value; if(!txt || !t) return;
            add(txt, 'user'); document.getElementById('in').value='';
            const models = ["meta-llama/Llama-3.2-1B-Instruct", "google/gemma-2-2b-it", "mistralai/Mistral-7B-v0.1"];
            let ok = false;
            for(let m of models){
                try {
                    let r = await fetch("https://api-inference.huggingface.co/models/"+m, {
                        headers: { Authorization: "Bearer "+t, "Content-Type": "application/json" },
                        method: "POST", body: JSON.stringify({ inputs: txt })
                    });
                    let j = await r.json();
                    if(r.ok){
                        let res = Array.isArray(j) ? j[0].generated_text : j.generated_text;
                        add(res.replace(txt, '').trim() || "Master, I am standing by.", 'bot');
                        ok=true; break;
                    } else if (j.error && j.error.includes('loading')){
                        add("Neural core "+m+" is loading... trying next.", 'bot');
                    }
                } catch(e){}
            }
            if(!ok) add("Connection failed. Check your token and internet.", 'bot');
        }
    </script>
</body>
</html>
