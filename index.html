<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether AI | Master Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-darker: #020617;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-darker); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%); }

        .app-container { width: 95%; max-width: 1000px; height: 90vh; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; display: flex; flex-direction: column; position: relative; }
        
        .header { padding: 20px 32px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Outfit'; font-weight: 700; font-size: 1.5rem; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .status-badge { display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: rgba(34, 197, 94, 0.1); border-radius: 100px; color: #4ade80; font-size: 0.8rem; font-weight: 600; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }

        .chat-area { flex: 1; padding: 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 80%; padding: 16px 20px; border-radius: 20px; line-height: 1.5; animation: fadeInUp 0.3s ease; }
        .message.bot { align-self: flex-start; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        .message.user { align-self: flex-end; background: var(--accent-gradient); color: white; border-bottom-right-radius: 4px; }

        .input-container { padding: 24px; border-top: 1px solid var(--glass-border); display: flex; gap: 12px; }
        input { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 14px 20px; border-radius: 16px; color: white; outline: none; }
        .send-btn { background: var(--accent-gradient); border: none; padding: 0 24px; border-radius: 16px; color: white; font-weight: 600; cursor: pointer; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal { background: #0f172a; padding: 40px; border-radius: 24px; border: 1px solid var(--glass-border); width: 400px; text-align: center; }
        .modal input { width: 100%; margin: 20px 0; }
        .modal button { width: 100%; padding: 14px; border-radius: 16px; background: var(--primary); color: white; border: none; font-weight: 700; cursor: pointer; }

        .debug-panel { position: absolute; bottom: 100px; right: 20px; font-size: 0.7rem; color: #f87171; max-width: 200px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="logo">AETHER AI</div>
            <div style="display: flex; gap: 12px;">
                <button onclick="toggleModal()" style="background:none; border:1px solid var(--glass-border); color:var(--text-dim); padding:6px 12px; border-radius:8px; cursor:pointer;">API</button>
                <div class="status-badge"><div class="status-dot"></div>Llama-3.2 Ready</div>
            </div>
        </header>

        <div class="chat-area" id="chat-box">
            <div class="message bot">System active. Standing by for your command, Master.</div>
        </div>

        <div id="debug" class="debug-panel"></div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Enter command..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <h2>System Auth</h2>
            <p style="color:var(--text-dim); font-size:0.9rem; margin-top:8px;">Paste Hugging Face Token (hf_...)</p>
            <input type="password" id="api-token" placeholder="hf_xxxxxxxxxxxx">
            <button onclick="saveToken()">Initialize Link</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const modal = document.getElementById('modal-overlay');
        const debug = document.getElementById('debug');
        
        let apiToken = localStorage.getItem('hf_token') || '';
        if (!apiToken) modal.style.display = 'flex';

        function toggleModal() { modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex'; }
        
        function saveToken() {
            const val = document.getElementById('api-token').value.trim();
            if (val) {
                apiToken = val;
                localStorage.setItem('hf_token', val);
                modal.style.display = 'none';
                addMessage('Link established. I am online.', 'bot');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || !apiToken) return;

            addMessage(text, 'user');
            userInput.value = '';
            debug.innerText = "Attempting neural link...";

            try {
                // Using Llama-3.2-1B-Instruct (High availability, no special license usually needed)
                const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Llama-3.2-1B-Instruct", {
                    headers: { Authorization: `Bearer ${apiToken}`, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({
                        inputs: `<|begin_of_text|><|start_header_id|>system<|end_header_id|>\nYou are Aether, a loyal AI assistant owned by the Master. Be extremely concise and respectful.<|eot_id|><|start_header_id|>user<|end_header_id|>\n${text}<|eot_id|><|start_header_id|>assistant<|end_header_id|>`,
                        parameters: { max_new_tokens: 250, temperature: 0.5 }
                    }),
                });

                const result = await response.json();

                if (!response.ok) {
                    debug.innerText = "Error: " + (result.error || "Unknown response");
                    addMessage("Master, the neural link rejected the request. Check the debug panel.", 'bot');
                } else {
                    debug.innerText = "Link stable.";
                    const reply = Array.isArray(result) ? result[0].generated_text : result.generated_text;
                    const cleanReply = reply.split('assistant<|end_header_id|>').pop().trim();
                    addMessage(cleanReply || "Standing by.", 'bot');
                }
            } catch (error) {
                debug.innerText = "Connection failed.";
                addMessage("Warning: Neural link offline.", 'bot');
            }
        }
    </script>
</body>
</html>
